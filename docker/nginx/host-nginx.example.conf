# Use this if another service (nginx, Apache, etc.) already owns ports 80+443.
#
# 1. Start BedWars without Caddy (default — caddy is behind the "caddy" profile):
#    docker compose --env-file .env up -d
#
# 2. Add the server blocks below to your existing nginx config
#    (or symlink into sites-enabled). Adjust SSL paths if needed.
#
# 3. Reload nginx:
#    sudo nginx -t && sudo systemctl reload nginx
#
# Docker listens on:
#   http://127.0.0.1:8080  → web (React)
#   http://127.0.0.1:8787  → backend (API + WebSockets)
#
# Change ports via WEB_HOST_PORT / BACKEND_HOST_PORT in .env if 8080/8787 are taken.

# bedwars.cash + www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bedwars.cash;

    ssl_certificate     /etc/letsencrypt/live/bedwars.cash/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bedwars.cash/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.bedwars.cash;

    ssl_certificate     /etc/letsencrypt/live/bedwars.cash/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bedwars.cash/privkey.pem;

    return 301 https://bedwars.cash$request_uri;
}

# server.bedwars.cash — API + WebSockets
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name server.bedwars.cash;

    ssl_certificate     /etc/letsencrypt/live/bedwars.cash/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bedwars.cash/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
