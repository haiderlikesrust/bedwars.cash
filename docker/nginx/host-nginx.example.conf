# Use this if nginx/Apache already owns ports 80+443 on the VPS.
# 1. Publish web/backend to localhost only (add to docker-compose.yml):
#
#    web:
#      ports:
#        - "127.0.0.1:8080:80"
#    backend:
#      ports:
#        - "127.0.0.1:8787:8787"
#
# 2. Stop the caddy service (or run compose without it):
#    docker compose --env-file .env up -d web backend minecraft
#
# 3. Install certbot for nginx, then enable these sites.

# bedwars.cash + www
server {
    listen 80;
    listen [::]:80;
    server_name bedwars.cash www.bedwars.cash;
    return 301 https://bedwars.cash$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bedwars.cash;

    ssl_certificate     /etc/letsencrypt/live/bedwars.cash/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bedwars.cash/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# server.bedwars.cash — API + WebSockets
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name server.bedwars.cash;

    ssl_certificate     /etc/letsencrypt/live/bedwars.cash/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bedwars.cash/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
